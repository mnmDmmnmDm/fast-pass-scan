<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Експрес Сканер v7</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        html, body { 
            height: 100%; margin: 0; padding: 0; 
            background: #000; color: white; 
            overflow: hidden; 
            display: flex; flex-direction: column; 
        }
        
        #flash {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: white; opacity: 0; pointer-events: none; z-index: 9999;
            transition: opacity 0.25s ease-out;
        }

        #video-container { position: relative; width: 100vw; height: 35%; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #scanner-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            box-sizing: border-box; pointer-events: none;
        }
        #reticle {
            width: 85%; height: 50px;
            border: 3px solid #00ff00; border-radius: 8px;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.6);
            position: relative;
        }
        #reticle::before {
            content: "Наведіть 'Password:' сюди"; position: absolute; top: -22px; left: 0;
            color: #00ff00; font-size: 11px; font-weight: bold; width: 100%; text-align: center;
        }

        #preview-container {
            position: absolute; bottom: 8px; right: 8px; width: 100px; height: 35px;
            border: 2px solid red; z-index: 100; background: black; border-radius: 4px; overflow: hidden;
        }
        #crop-canvas { width: 100%; height: 100%; object-fit: contain; }

        #controls { 
            height: 65%; background: #fff; color: #333; 
            padding: 12px; box-sizing: border-box; 
            display: flex; flex-direction: column; 
            justify-content: space-between; 
        }
        
        .header { font-size: 13px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px;}
        #status { font-size: 12px; color: #666; font-weight: normal;}
        
        .zoom-container { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 13px; font-weight: bold; }
        #zoom-range { flex-grow: 1; height: 6px; }

        #passwords-list { 
            width: 100%; 
            height: 110px; 
            min-height: 110px;
            max-height: 110px;
            box-sizing: border-box; padding: 6px; 
            border: 1px solid #ccc; border-radius: 6px; 
            font-family: monospace; font-size: 14px; 
            line-height: 20px;
            resize: none; 
            overflow-y: auto; 
            margin-bottom: 6px; 
            background: #fafafa;
            color: #111;
        }
        
        .btn-group { display: flex; gap: 6px; width: 100%; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none;}
        .btn-success { background: #25D366; color: white; }
        .btn-secondary { background: #f0f2f5; color: #333; border: 1px solid #ccc;}
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <div id="scanner-overlay">
            <div id="reticle"></div>
        </div>
        <div id="preview-container">
            <canvas id="crop-canvas"></canvas>
        </div>
    </div>

    <div id="controls">
        <div>
            <div class="header">
                <span>Масштабування камери:</span>
                <span id="status">Запуск...</span>
            </div>
            
            <div class="zoom-container">
                <span>🔎 Зум:</span>
                <input type="range" id="zoom-range" min="1" max="10" step="0.5" value="3">
                <span id="zoom-val">3.0x</span>
            </div>
        </div>
        
        <textarea id="passwords-list" readonly placeholder="Паролі з'являтимуться тут..."></textarea>
        
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="clearList()">Очистити</button>
            <button class="btn btn-success" onclick="sendToWhatsApp()">💬 Відправити у WhatsApp</button>
        </div>
    </div>

    <canvas id="crop-canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('crop-canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const passwordsList = document.getElementById('passwords-list');
        const reticle = document.getElementById('reticle');
        const flash = document.getElementById('flash');
        
        const zoomRange = document.getElementById('zoom-range');
        const zoomVal = document.getElementById('zoom-val');

        let worker = null;
        let isProcessing = false;
        let lastScannedPassword = "";
        let scanTimer = null;
        let currentStream = null;

        function playScanBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                oscillator.stop(audioCtx.currentTime + 0.12);
            } catch (e) {
                console.log("Audio заблоковано.");
            }
        }

        function triggerFlashEffect() {
            flash.style.transition = 'none';
            flash.style.opacity = '0.8';
            setTimeout(() => {
                flash.style.transition = 'opacity 0.25s ease-out';
                flash.style.opacity = '0';
            }, 50);
        }

        async function initOCR() {
            statusDiv.innerText = "⏳ Налаштування OCR...";
            worker = await Tesseract.createWorker('eng', 1);
            
            await worker.setParameters({
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789Password: ',
                tessedit_pageseg_mode: Tesseract.PSM.SINGLE_LINE,
            });
            
            statusDiv.innerText = "🟢 Активно";
            statusDiv.style.color = "green";
            startScanningLoop();
        }

        async function initCameraSystem() {
            try {
                statusDiv.innerText = "🔄 Запуск задньої камери...";
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "environment", 
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }, 
                    audio: false 
                });
                video.srcObject = currentStream;
                await video.play();

                const track = currentStream.getVideoTracks()[0];
                const capabilities = track.getCapabilities ? track.getCapabilities() : null;

                if (capabilities && 'zoom' in capabilities) {
                    const minZoom = capabilities.zoom.min;
                    const maxZoom = capabilities.zoom.max;
                    const startZoom = Math.max(minZoom, Math.min(maxZoom, 3.0)); // Ставимо 3х за дефолтом

                    zoomRange.min = minZoom;
                    zoomRange.max = maxZoom;
                    zoomRange.step = capabilities.zoom.step || 0.1;
                    zoomRange.value = startZoom;
                    zoomVal.innerText = `${startZoom.toFixed(1)}x`;

                    try {
                        await track.applyConstraints({ advanced: [{ zoom: startZoom }] });
                    } catch(e) {
                        console.log("Помилка стартового зуму:", e);
                    }
                }

                zoomRange.oninput = async (e) => {
                    const value = parseFloat(e.target.value);
                    zoomVal.innerText = `${value.toFixed(1)}x`;
                    try {
                        await track.applyConstraints({ advanced: [{ zoom: value }] });
                    } catch(err) {
                        console.log("Зум не застосувався:", err);
                    }
                };

                initOCR();
            } catch (err) {
                statusDiv.innerText = "❌ Помилка камери.";
                statusDiv.style.color = "red";
                console.error(err);
            }
        }

        function startScanningLoop() {
            if (scanTimer) clearInterval(scanTimer);
            scanTimer = setInterval(async () => {
                if (isProcessing || !worker) return;
                await processFrame();
            }, 600);
        }

        // ТОЧНИЙ РОЗРАХУНОК КООРДИНАТ З УРАХУВАННЯМ OBJECT-FIT: COVER
        async function processFrame() {
            isProcessing = true;
            
            const videoWidth = video.videoWidth;
            const videoHeight = video.videoHeight;
            const displayWidth = video.clientWidth;
            const displayHeight = video.clientHeight;
            
            if (!videoWidth || !videoHeight) {
                isProcessing = false;
                return;
            }

            // Вираховуємо коефіцієнт масштабування та зміщення (offsets) через object-fit: cover
            const videoRatio = videoWidth / videoHeight;
            const displayRatio = displayWidth / displayHeight;
            
            let scale, xOffset = 0, yOffset = 0;
            
            if (displayRatio > videoRatio) {
                // Відео обрізане зверху та знизу
                scale = displayWidth / videoWidth;
                yOffset = (videoHeight * scale - displayHeight) / 2;
            } else {
                // Відео обрізане зліва та справа
                scale = displayHeight / videoHeight;
                xOffset = (videoWidth * scale - displayWidth) / 2;
            }
            
            const reticleRect = reticle.getBoundingClientRect();
            const videoRect = video.getBoundingClientRect();
            
            // Позиція рамки відносно контейнера відео на екрані
            const dx = reticleRect.left - videoRect.left;
            const dy = reticleRect.top - videoRect.top;

            // Точний перерахунок у координати чистого матричного кадру камери
            const sx = (dx + xOffset) / scale;
            const sy = (dy + yOffset) / scale;
            const sw = reticleRect.width / scale;
            const sh = reticleRect.height / scale;

            canvas.width = sw;
            canvas.height = sh;

            // Малюємо ідеальний кроп
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);
            
            // Контрастування
            const imgData = ctx.getImageData(0, 0, sw, sh);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const brightness = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
                const threshold = 125;
                const color = brightness > threshold ? 255 : 0;
                data[i] = color;
                data[i + 1] = color;
                data[i + 2] = color;
            }
            ctx.putImageData(imgData, 0, 0);

            const base64Image = canvas.toDataURL('image/png');

            try {
                const { data: { text } } = await worker.recognize(base64Image);
                const cleanText = text.trim();
                
                const regex = /password\s*:\s*([A-Z0-9]{4,20})/i;
                const match = cleanText.match(regex);

                if (match && match[1]) {
                    const password = match[1];

                    if (password !== lastScannedPassword) {
                        triggerFlashEffect(); 
                        playScanBeep();       
                        addPasswordToList(password);
                        
                        reticle.style.borderColor = "#25D366";
                        setTimeout(() => reticle.style.borderColor = "#00ff00", 400);
                    }
                }
            } catch (ocrErr) {
                console.error("OCR Error:", ocrErr);
            }

            isProcessing = false;
        }

        function addPasswordToList(pass) {
            lastScannedPassword = pass;
            if (passwordsList.value.trim() !== "") {
                passwordsList.value += "\n";
            }
            passwordsList.value += pass;
            passwordsList.scrollTop = passwordsList.scrollHeight; 
            localStorage.setItem('router_passwords_list_v7', passwordsList.value);
        }
        
        function clearList() {
            if(confirm("Очистити список?")) {
                passwordsList.value = "";
                localStorage.removeItem('router_passwords_list_v7');
                lastScannedPassword = "";
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('router_passwords_list_v7');
            if (saved) {
                passwordsList.value = saved;
                passwordsList.scrollTop = passwordsList.scrollHeight;
            }
            initCameraSystem();
        };

        function sendToWhatsApp() {
            const text = passwordsList.value.trim();
            if (!text) return alert("Список порожній!");
            
            const encodedText = encodeURIComponent("Знайдені паролі:\n\n" + text);
            const whatsappUrl = `https://api.whatsapp.com/send?text=${encodedText}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
