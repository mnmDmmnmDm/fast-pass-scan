<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Експрес Сканер v5</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #000; color: white; overflow: hidden; position: relative; }
        
        /* Візуальний спалах при успішному зчитуванні */
        #flash {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: white; opacity: 0; pointer-events: none; z-index: 9999;
            transition: opacity 0.05s ease-out;
        }

        /* Відеопотік */
        #video-container { position: relative; width: 100vw; height: 40vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Повернули вузьку рамку сканування */
        #scanner-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            box-sizing: border-box; pointer-events: none;
        }
        #reticle {
            width: 85%; height: 50px; /* Попередні ідеальні параметри */
            border: 3px solid #00ff00; border-radius: 8px;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.6);
            position: relative;
            transition: border-color 0.1s ease;
        }
        #reticle::before {
            content: "Наведіть 'Password:' сюди"; position: absolute; top: -22px; left: 0;
            color: #00ff00; font-size: 11px; font-weight: bold; width: 100%; text-align: center;
        }

        /* Очі сканера */
        #preview-container {
            position: absolute; bottom: 8px; right: 8px; width: 100px; height: 35px;
            border: 2px solid red; z-index: 100; background: black; border-radius: 4px; overflow: hidden;
        }
        #crop-canvas { width: 100%; height: 100%; object-fit: contain; }

        /* Панель керування (оптимізовано розміри під маленькі екрани) */
        #controls { 
            height: 60vh; background: #fff; color: #333; 
            padding: 8px 12px; box-sizing: border-box; 
            position: relative; z-index: 10; 
            display: flex; flex-direction: column; justify-content: space-between; 
        }
        .header { font-size: 13px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px;}
        #status { font-size: 12px; color: #666; font-weight: normal;}
        
        /* Зум слайдер (тепер відображається завжди для зручності) */
        .zoom-container { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 13px; font-weight: bold; }
        #zoom-range { flex-grow: 1; height: 6px; }

        #passwords-list { 
            width: 100%; flex-grow: 1; height: 60px; 
            box-sizing: border-box; padding: 6px; 
            border: 1px solid #ccc; border-radius: 6px; 
            font-family: monospace; font-size: 14px; 
            resize: none; margin-bottom: 6px; 
        }
        
        /* Кнопки стали ще компактнішими */
        .btn-group { display: flex; gap: 6px; }
        .btn { flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none;}
        .btn-success { background: #25D366; color: white; }
        .btn-secondary { background: #f0f2f5; color: #333; border: 1px solid #ccc;}
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <div id="scanner-overlay">
            <div id="reticle"></div>
        </div>
        <div id="preview-container">
            <canvas id="crop-canvas"></canvas>
        </div>
    </div>

    <div id="controls">
        <div>
            <div class="header">
                <span>Використовуйте повзунок для активації 5x камери:</span>
                <span id="status">Запуск...</span>
            </div>
            
            <div class="zoom-container">
                <span>🔎 Зум:</span>
                <input type="range" id="zoom-range" min="1" max="10" step="0.5" value="1">
                <span id="zoom-val">1.0x</span>
            </div>
        </div>
        
        <textarea id="passwords-list" readonly placeholder="Паролі з'являтимуться тут..."></textarea>
        
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="clearList()">Очистити</button>
            <button class="btn btn-success" onclick="sendToWhatsApp()">💬 Відправити у WhatsApp</button>
        </div>
    </div>

    <canvas id="crop-canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('crop-canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const passwordsList = document.getElementById('passwords-list');
        const reticle = document.getElementById('reticle');
        const flash = document.getElementById('flash');
        
        const zoomRange = document.getElementById('zoom-range');
        const zoomVal = document.getElementById('zoom-val');

        let worker = null;
        let isProcessing = false;
        let lastScannedPassword = "";
        let scanTimer = null;
        let currentStream = null;

        // Генерація звукового сигналу "БІП" за допомогою коду
        function playScanBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1000, audioCtx.currentTime); // Висока частота
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime); // Гучність
                
                oscillator.start();
                // Швидке загасання звуку (за 0.12 секунди)
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                oscillator.stop(audioCtx.currentTime + 0.12);
            } catch (e) {
                console.log("Audio API не підтримується або заблоковано браузером.");
            }
        }

        // Ефект спалаху екрана
        function triggerFlashEffect() {
            flash.style.transition = 'none';
            flash.style.opacity = '0.8'; // Яскравий білий спалах
            
            setTimeout(() => {
                flash.style.transition = 'opacity 0.25s ease-out';
                flash.style.opacity = '0'; // Плавне зникнення
            }, 50);
        }

        // 1. OCR Налаштування
        async function initOCR() {
            statusDiv.innerText = "⏳ Налаштування OCR...";
            worker = await Tesseract.createWorker('eng', 1);
            
            await worker.setParameters({
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789Password: ',
                tessedit_pageseg_mode: Tesseract.PSM.SINGLE_LINE,
            });
            
            statusDiv.innerText = "🟢 Активно";
            statusDiv.style.color = "green";
            startScanningLoop();
        }

        // 2. Ініціалізація камери (завжди обираємо задню)
        async function initCameraSystem() {
            try {
                statusDiv.innerText = "🔄 Запуск задньої камери...";
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "environment", // Пріоритет задній камері
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }, 
                    audio: false 
                });
                video.srcObject = currentStream;
                await video.play();

                // Налаштування повзунка зуму
                const track = currentStream.getVideoTracks()[0];
                const capabilities = track.getCapabilities ? track.getCapabilities() : null;

                if (capabilities && 'zoom' in capabilities) {
                    zoomRange.min = capabilities.zoom.min;
                    zoomRange.max = capabilities.zoom.max;
                    zoomRange.step = capabilities.zoom.step || 0.1;
                    zoomRange.value = capabilities.zoom.min;
                }

                zoomRange.oninput = async (e) => {
                    const value = parseFloat(e.target.value);
                    zoomVal.innerText = `${value.toFixed(1)}x`;
                    try {
                        await track.applyConstraints({ advanced: [{ zoom: value }] });
                    } catch(err) {
                        console.log("Зум не застосувався апаратно:", err);
                    }
                };

                initOCR();
            } catch (err) {
                statusDiv.innerText = "❌ Помилка камери. Перевірте HTTPS!";
                statusDiv.style.color = "red";
                console.error(err);
            }
        }

        // 3. Цикл сканування
        function startScanningLoop() {
            if (scanTimer) clearInterval(scanTimer);
            scanTimer = setInterval(async () => {
                if (isProcessing || !worker) return;
                await processFrame();
            }, 600);
        }

        // 4. Кроп кадру та OCR
        async function processFrame() {
            isProcessing = true;
            
            const videoWidth = video.videoWidth;
            const videoHeight = video.videoHeight;
            const displayWidth = video.clientWidth;
            const displayHeight = video.clientHeight;
            
            if (!videoWidth || !videoHeight) {
                isProcessing = false;
                return;
            }

            const scaleX = videoWidth / displayWidth;
            const scaleY = videoHeight / displayHeight;
            
            const reticleRect = reticle.getBoundingClientRect();
            const videoRect = video.getBoundingClientRect();
            
            const sx = (reticleRect.left - videoRect.left) * scaleX;
            const sy = (reticleRect.top - videoRect.top) * scaleY;
            const sw = reticleRect.width * scaleX;
            const sh = reticleRect.height * scaleY;

            canvas.width = sw;
            canvas.height = sh;

            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);
            
            // Чорно-білий фільтр для кращої контрастності
            const imgData = ctx.getImageData(0, 0, sw, sh);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const brightness = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
                const threshold = 125;
                const color = brightness > threshold ? 255 : 0;
                data[i] = color;
                data[i + 1] = color;
                data[i + 2] = color;
            }
            ctx.putImageData(imgData, 0, 0);

            const base64Image = canvas.toDataURL('image/png');

            try {
                const { data: { text } } = await worker.recognize(base64Image);
                const cleanText = text.trim();
                
                // Тільки Password: [A-Z0-9]
                const regex = /password\s*:\s*([A-Z0-9]{4,20})/i;
                const match = cleanText.match(regex);

                if (match && match[1]) {
                    const password = match[1];

                    if (password !== lastScannedPassword) {
                        // СИГНАЛИ ПРО УСПІХ
                        triggerFlashEffect(); // Спалах
                        playScanBeep();       // Звук
                        
                        addPasswordToList(password);
                        
                        reticle.style.borderColor = "#25D366";
                        setTimeout(() => reticle.style.borderColor = "#00ff00", 400);
                    }
                }
            } catch (ocrErr) {
                console.error("OCR Error:", ocrErr);
            }

            isProcessing = false;
        }

        function addPasswordToList(pass) {
            lastScannedPassword = pass;
            if (passwordsList.value.trim() !== "") {
                passwordsList.value += "\n";
            }
            passwordsList.value += pass;
            passwordsList.scrollTop = passwordsList.scrollHeight;
            localStorage.setItem('router_passwords_list_v5', passwordsList.value);
        }
        
        function clearList() {
            if(confirm("Очистити список?")) {
                passwordsList.value = "";
                localStorage.removeItem('router_passwords_list_v5');
                lastScannedPassword = "";
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('router_passwords_list_v5');
            if (saved) passwordsList.value = saved;
            initCameraSystem();
        };

        function sendToWhatsApp() {
            const text = passwordsList.value.trim();
            if (!text) return alert("Список порожній!");
            
            const encodedText = encodeURIComponent("Знайдені паролі:\n\n" + text);
            const whatsappUrl = `https://api.whatsapp.com/send?text=${encodedText}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
