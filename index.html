<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Експрес Сканер Роутерів v2</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #000; color: white; overflow: hidden; }
        
        /* Відеопотік */
        #video-container { position: relative; width: 100vw; height: 50vh; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Рамка сканування */
        #scanner-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            box-sizing: border-box; pointer-events: none;
        }
        #reticle {
            width: 85%; height: 50px;
            border: 3px solid #00ff00; border-radius: 8px;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.6);
            position: relative;
        }
        #reticle::before {
            content: "Помістіть рядок 'Password:' сюди"; position: absolute; top: -25px; left: 0;
            color: #00ff00; font-size: 13px; font-weight: bold; width: 100%; text-align: center;
        }

        /* Очі сканера (прев'ю кропу в кутку) */
        #preview-container {
            position: absolute; bottom: 10px; right: 10px; width: 120px; height: 35px;
            border: 2px solid red; z-index: 100; background: black; border-radius: 4px; overflow: hidden;
        }
        #crop-canvas { width: 100%; height: 100%; object-fit: contain; }

        /* Панель керування */
        #controls { height: 50vh; background: #fff; color: #333; padding: 12px; box-sizing: border-box; position: relative; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; }
        .header { font-size: 16px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;}
        #status { font-size: 13px; color: #666; font-weight: normal;}
        
        #camera-select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; margin-bottom: 10px; background: #fff; }
        #passwords-list { width: 100%; flex-grow: 1; height: 100px; box-sizing: border-box; padding: 8px; border: 1px solid #ccc; border-radius: 8px; font-family: monospace; font-size: 15px; resize: none; margin-bottom: 8px; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none;}
        .btn-success { background: #25D366; color: white; }
        .btn-secondary { background: #f0f2f5; color: #333; border: 1px solid #ccc;}
    </style>
</head>
<body>

    <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <div id="scanner-overlay">
            <div id="reticle"></div>
        </div>
        <div id="preview-container">
            <canvas id="crop-canvas"></canvas>
        </div>
    </div>

    <div id="controls">
        <div>
            <div class="header">
                <span>Оберіть камеру (спробуйте х2):</span>
                <span id="status">Запуск...</span>
            </div>
            <select id="camera-select"><option>Завантаження камер...</option></select>
        </div>
        
        <textarea id="passwords-list" readonly placeholder="Паролі з'являтимуться тут..."></textarea>
        
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="clearList()">Очистити</button>
            <button class="btn btn-success" onclick="sendToWhatsApp()">💬 Відправити у WhatsApp</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('crop-canvas');
        const ctx = canvas.getContext('2d');
        const statusDiv = document.getElementById('status');
        const passwordsList = document.getElementById('passwords-list');
        const reticle = document.getElementById('reticle');
        const cameraSelect = document.getElementById('camera-select');

        let worker = null;
        let isProcessing = false;
        let lastScannedPassword = "";
        let scanTimer = null;
        let currentStream = null;

        // 1. Ініціалізація швидкого Tesseract
        async function initOCR() {
            statusDiv.innerText = "⏳ Налаштування OCR...";
            worker = await Tesseract.createWorker('eng', 1);
            
            await worker.setParameters({
                // Великі літери, цифри, двокрапка та пробіл
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789Password: ',
                tessedit_pageseg_mode: Tesseract.PSM.SINGLE_LINE,
            });
            
            statusDiv.innerText = "🟢 Сканування активне";
            statusDiv.style.color = "green";
            startScanningLoop();
        }

        // 2. Отримання списку камер та запуск обраної
        async function initCameraSystem() {
            try {
                // Запитуємо доступ до камери спочатку, щоб отримати дозволи
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                video.srcObject = currentStream;
                await video.play();

                // Отримуємо всі камери після надання дозволу
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');

                cameraSelect.innerHTML = "";
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    // Спробуємо підписати камери зрозуміліше
                    option.text = device.label || `Камера ${index + 1}`;
                    cameraSelect.appendChild(option);
                });

                // Якщо є більше однієї камери, вибираємо останню (часто це додаткові модулі/зум)
                if (videoDevices.length > 1) {
                    cameraSelect.selectedIndex = videoDevices.length - 1;
                    await switchCamera(cameraSelect.value);
                }

                initOCR();
            } catch (err) {
                statusDiv.innerText = "❌ Помилка доступу до камери.";
                statusDiv.style.color = "red";
                console.error(err);
            }
        }

        // Перемикання камери
        async function switchCamera(deviceId) {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            statusDiv.innerText = "🔄 Перемикання камери...";
            
            const constraints = {
                video: {
                    deviceId: { exact: deviceId },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                await video.play();
                statusDiv.innerText = "🟢 Сканування активне";
            } catch (err) {
                statusDiv.innerText = "❌ Помилка цієї камери.";
                statusDiv.style.color = "red";
            }
        }

        cameraSelect.addEventListener('change', (e) => {
            switchCamera(e.target.value);
        });

        // 3. Цикл обробки кадрів
        function startScanningLoop() {
            if (scanTimer) clearInterval(scanTimer);
            scanTimer = setInterval(async () => {
                if (isProcessing || !worker) return;
                await processFrame();
            }, 600); // Оптимальний інтервал (трохи більше пів секунди)
        }

        // 4. Обрізка та OCR
        async function processFrame() {
            isProcessing = true;
            
            const videoWidth = video.videoWidth;
            const videoHeight = video.videoHeight;
            const displayWidth = video.clientWidth;
            const displayHeight = video.clientHeight;
            
            if (!videoWidth || !videoHeight) {
                isProcessing = false;
                return;
            }

            const scaleX = videoWidth / displayWidth;
            const scaleY = videoHeight / displayHeight;
            
            const reticleRect = reticle.getBoundingClientRect();
            const videoRect = video.getBoundingClientRect();
            
            const sx = (reticleRect.left - videoRect.left) * scaleX;
            const sy = (reticleRect.top - videoRect.top) * scaleY;
            const sw = reticleRect.width * scaleX;
            const sh = reticleRect.height * scaleY;

            canvas.width = sw;
            canvas.height = sh;

            // Малюємо обрізану рамку
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);
            
            // --- ПОКРАЩЕННЯ ЗОБРАЖЕННЯ ДЛЯ OCR ---
            // Переводимо картинку в чіткий контраст (чорно-білий фільтр у браузері)
            const imgData = ctx.getImageData(0, 0, sw, sh);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                // Простий алгоритм перетворення на сірий та поріг яскравості
                const brightness = 0.34 * data[i] + 0.5 * data[i + 1] + 0.16 * data[i + 2];
                const threshold = 120; // поріг яскравості
                const color = brightness > threshold ? 255 : 0;
                data[i] = color;     // R
                data[i + 1] = color; // G
                data[i + 2] = color; // B
            }
            ctx.putImageData(imgData, 0, 0);
            // -------------------------------------

            const base64Image = canvas.toDataURL('image/png');

            try {
                const { data: { text } } = await worker.recognize(base64Image);
                const cleanText = text.trim();
                
                // Регулярний вираз: шукає слово "Password" (ігнорує регістр), двокрапку або пробіл, 
                // та групу з ВЕЛИКИХ літер та цифр від 4 до 20 символів.
                const regex = /password\s*:\s*([A-Z0-9]{4,20})/i;
                const match = cleanText.match(regex);

                if (match && match[1]) {
                    const password = match[1];

                    if (password !== lastScannedPassword) {
                        addPasswordToList(password);
                        
                        // Підсвічуємо рамку зеленим при успіху
                        reticle.style.borderColor = "#25D366";
                        setTimeout(() => reticle.style.borderColor = "#00ff00", 400);
                    }
                }
            } catch (ocrErr) {
                console.error("Помилка OCR:", ocrErr);
            }

            isProcessing = false;
        }

        function addPasswordToList(pass) {
            lastScannedPassword = pass;
            if (passwordsList.value.trim() !== "") {
                passwordsList.value += "\n";
            }
            passwordsList.value += pass;
            passwordsList.scrollTop = passwordsList.scrollHeight;
            localStorage.setItem('router_passwords_list_v2', passwordsList.value);
        }
        
        function clearList() {
            if(confirm("Очистити список?")) {
                passwordsList.value = "";
                localStorage.removeItem('router_passwords_list_v2');
                lastScannedPassword = "";
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('router_passwords_list_v2');
            if (saved) passwordsList.value = saved;
            initCameraSystem();
        };

        function sendToWhatsApp() {
            const text = passwordsList.value.trim();
            if (!text) return alert("Список порожній!");
            
            const encodedText = encodeURIComponent("Знайдені паролі:\n\n" + text);
            const whatsappUrl = `https://api.whatsapp.com/send?text=${encodedText}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
